name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: files_mediaviewer

jobs:
  get-vars:
    runs-on: ubuntu-latest
    outputs:
      app-name: ${{ env.APP_NAME }}
    steps:
      - name: Set variables
        run: |
          echo "App name $APP_NAME"

  semantic-git-messages:
    name: Commits
    uses: owncloud/reusable-workflows/.github/workflows/semantic-git-message.yml@main

  js-unit:
    name: JS Unit
    needs:
      - get-vars
    uses: owncloud/reusable-workflows/.github/workflows/js-unit.yml@main
    with:
      app-name: ${{ needs.get-vars.outputs.app-name }}
      php-version: '8.3'
